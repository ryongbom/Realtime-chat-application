<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleChat</title>
    <link href="indexStyle.css" rel="stylesheet">
</head>
<body>
    <div id="loginScreen">
        <h1>Log in (Simple Chat)</h1>
        <div class="inputArea">
            <label>nickname:</label>
            <input type="text" class="nicknameInput" placeholder="Enter your Nickname...">
        </div>
        <button onclick="login()" class="loginBtn">Go to Chating ROOM</button>
    </div>

    <div id="chatScreen">
        <div class="header-chat">
            <span id="nickname"></span>
            <span class="status">Connected</span>
        </div>

        <div id="messages">

        </div>

        <div class="footer-chat">
            <input type="text" class="messageInput" placeholder="Enter your message...">
            <button onclick="sendMessage()" class="sendBtn">Send</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const statusConnect = document.querySelector('.status');
        const messageInput = document.querySelector('.messageInput');
        const messages = document.getElementById('messages');
        const nicknameInput = document.querySelector('.nicknameInput');
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');

        const socket = io();
        let mySocketId = '';
        let nickname = '';

        socket.on('connect', () => {
            console.log('Successfully connected', socket.id);
            mySocketId = socket.id;
        });

        socket.on('chat message', (data) => {
            addMessage(data.type, data.userId, data.content, data.timeStamp);
        })

        socket.on('system nick', (data) => {
            console.log('successfully receive nickname', data.nickname);
            addMessage(data.type, data.userId, data.nickname, data.timeStamp);
        })

        socket.on('disconnect', () => {
            console.log('disconnected');
        })

        function statusDisconnected() {
            document.querySelector('.status').textContent = 'disconnected';
            document.querySelector('.status').style.color = 'red';
        }

        function login() {
            nickname = nicknameInput.value.trim();

            socket.emit('nickname', {
                type: 'system',
                nickname: nickname,
                userId: mySocketId,
                timeStamp: new Date().toLocaleTimeString()
            });

            console.log('successfully sended nickname', nickname);

            loginScreen.style.display = 'none';
            chatScreen.style.display = 'block';
        }

        function sendMessage() {
            const msg = messageInput.value;
            socket.emit('chat message', {
                type: 'user',
                content: msg,
                userId: mySocketId,
                timeStamp: new Date().toLocaleTimeString()
            });
            console.log('send message: ', msg);
            addMessage('me', msg);
            messageInput.value = '';
        }

        function addMessage(type, id, msg, time) {
            const newMessage = document.createElement('div');
            if (type === 'user') {
                newMessage.className = 'user-message';
                newMessage.textContent = msg;
                messages.appendChild(newMessage);
            } else if (type === 'system') {
                newMessage.className = 'system-message';
                newMessage.textContent = `${msg} joined at ${time}`;
                messages.appendChild(newMessage);
            }
        }
    </script>
</body>
</html>
