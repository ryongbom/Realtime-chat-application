<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleChat</title>
    <link href="indexStyle.css" rel="stylesheet">
</head>
<body>
    <div id="loginScreen">
        <h1>Log in (Simple Chat)</h1>
        <div class="inputArea">
            <label>nickname:</label>
            <input type="text" class="nicknameInput" placeholder="Enter your Nickname...">
        </div>
        <button onclick="login()" class="loginBtn">Go to Chating ROOM</button>
    </div>

    <div id="chatScreen">
        <div class="left-area">

        </div>
        <div class="main-chat">
            <div class="header-chat">
                <span id="nickname" style="margin-left: 20px; margin-bottom: 10px; color: white;"></span>
                <span class="status">Connected</span>
            </div>

            <div id="messages">

            </div>

            <div class="footer-chat">
                <input type="text" class="messageInput" placeholder="Enter your message...">
                <button onclick="sendMessage()" class="sendBtn">Send</button>
            </div>
        </div>
        
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const statusConnect = document.querySelector('.status');
        const messageInput = document.querySelector('.messageInput');
        const messages = document.getElementById('messages');
        const nicknameInput = document.querySelector('.nicknameInput');
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const nicknameDisplay = document.getElementById('nickname');

        const socket = io();
        let mySocketId = '';
        let myNickname = '';

        socket.on('connect', () => {
            console.log('Successfully connected', socket.id);
            mySocketId = socket.id;
        });

        socket.on('chat message', (data) => {
            addMessage(data.type, data.userId, data.nickname, data.content, data.timeStamp);
        });

        socket.on('system message', (data) => {
            addSystemMessage(data.content, data.timeStamp);
        });

        socket.on('disconnect', () => {
            console.log('disconnected from server');
            statusDisconnected();
        });

        function statusDisconnected() {
            document.querySelector('.status').textContent = 'disconnected';
            document.querySelector('.status').style.color = 'red';
            messageInput.disabled = true;
        }

        function login() {
            myNickname = nicknameInput.value.trim();

            if (myNickname === '') {
                alert('Please enter a nickname!');
                return;
            }

            nicknameDisplay.textContent = myNickname;

            socket.emit('nickname', {
                nickname: myNickname,
                timeStamp: new Date().toLocaleTimeString()
            });

            console.log('nickname sent:', myNickname);

            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            messageInput.focus();
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (msg === '') {
                return;
            }

            socket.emit('chat message', {
                type: 'user',
                content: msg,
                userId: mySocketId,
                timeStamp: new Date().toLocaleTimeString()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        function addMessage(type, userId, nickname, content, time) {
            const newMessage = document.createElement('div');
            if (type === 'user') {
                if (mySocketId === userId) {
                    newMessage.className = 'my-message';
                    newMessage.innerHTML = `
                        <div class="message-content">${content}</div>
                        <div class="message-time">${time}</div>
                    `;
                } else {
                    newMessage.className = 'user-message';
                    newMessage.innerHTML = `
                        <div class="message-nickname">${nickname}</div>
                        <div class="message-content">${content}</div>
                        <div class="message-time">${time}</div>
                    `;
                }
            } 
            
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;
        }

        function addSystemMessage(content, time) {
            const newMessage = document.createElement('div');
            newMessage.className = 'system-message';
            newMessage.innerHTML = `
                <div class="system-content">📢 ${content}</div>
                <div class="system-time">${time}</div>
            `;
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
