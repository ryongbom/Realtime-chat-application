<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time chat</title>
    <link href="indexStyle.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Real-time Chat Level 1</h1>

        <div class="status disconnected" id="status">
            🔴 Not connected to server
        </div>

        <div class="socket-id" id="socketId">
            Socket id:none
        </div>

        <div class="user-count" id="userCount">
            👥 접속자 수: 0
        </div>

        <div class="chat-box">
            <ul id="messages"></ul>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type a message..." disabled>
                <button id="sendButton" disabled>Send</button>
            </div>
        </div>
    </div>

    <!-- Socket.io client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const statusDiv = document.getElementById('status');
        const socketIdDiv = document.getElementById('socketId');
        const userCountDiv = document.getElementById('userCount');
        const messagesList = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');

        let mySocketId = '';

        // When connection is successful
        socket.on('connect', () => {
            mySocketId = socket.id;
            console.log('Connected to server!', mySocketId);

            statusDiv.className = 'status connected';
            statusDiv.innerHTML = '🟢 Connected to server!';
            socketIdDiv.innerHTML = `Socket ID: ${socket.id}`;

            messageInput.disabled = false;
            sendButton.disabled = false;
            messageInput.focus();
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server!');

            statusDiv.className = 'status disconnected';
            statusDiv.innerHTML = '🔴 Disconnected from server';
            socketIdDiv.innerHTML = 'Socket ID: none';
            userCountDiv.innerHTML = '👥 접속자 수: 0';
            
            // 입력창과 버튼 비활성화
            messageInput.disabled = true;
            sendButton.disabled = true;
        });

        socket.on('chat message', (data) => {
            console.log('Received data', data);

            if (data.type === 'system') {
                addSystemMessage(data.content, data.timestamp);

                if (data.content.includes('명')) {
                    const match = data.content.match(/(\d+)명/);
                    if (match) {
                        userCountDiv.innerHTML = `👥 접속자 수: ${match[1]}`;
                    }
                }
            } else if (data.type === 'user') {
                if (data.userId === mySocketId) {
                    addMyMessage(data.content, data.timestamp);
                } else {
                    addOtherMessage(data.userId, data.content, data.timestamp);
                }
            } 
        });

        // send message
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (msg) {
                socket.emit('chat message', msg);
                messageInput.value = '';
            }
        }

        // add myMessage
        function addMyMessage(content, timestamp) {
            const li = document.createElement('li');
            li.className = 'my-message';
            li.innerHTML = `
                <div class="message-info">나 (${timestamp})</div>
                <div>${content}</div>
            `;
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // add other message
        function addOtherMessage(userId, content, timestamp) {
            const li = document.createElement('li');
            li.className = 'other-message';
            // 사용자 ID 줄여서 표시
            const shortId = userId.substring(0, 4) + '...';
            li.innerHTML = `
                <div class="message-info">${shortId} (${timestamp})</div>
                <div>${content}</div>
            `;
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        // system message
        function addSystemMessage(content, timestamp) {
            const li = document.createElement('li');
            li.className = 'system-message';
            li.innerHTML = `
                <div>${content}</div>
                <div style="font-size: 0.7em;">${timestamp}</div>
            `;
            messagesList.appendChild(li);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        socket.on('connect_error', (error) => {
            console.log('Connection error:', error);
            
            addSystemMessage('⚠️ 서버 연결 오류! 서버가 실행중인지 확인하세요.', 
                           new Date().toLocaleTimeString());
        });
    </script>
</body>
</html>
