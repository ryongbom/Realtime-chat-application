<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleChat</title>
    <link href="indexStyle.css" rel="stylesheet">
</head>
<body>
    <div id="loginScreen">
        <h1>Log in (Simple Chat)</h1>
        <div class="inputArea">
            <label>nickname:</label>
            <input type="text" class="nicknameInput" placeholder="Enter your Nickname...">
        </div>
        <button onclick="login()" class="loginBtn">Go to Chating ROOM</button>
    </div>

    <div id="chatScreen">
        <div class="left-area">
            <div class="create-room">
                <p class="text-create">Do you want to create chating room?</p>
                <button onclick="createRoom()" class="createRoom">Create</button>
            </div>

            <div id="roomList">

            </div>
        </div>
        <div class="main-chat">
            <div class="header-chat">
                <span id="currentRoom" style="margin-left: 20px; color: #2B5278; margin-bottom: 7px;">No room</span>
                <span id="nickname" style="margin-left: 20px; color: white; margin-bottom: 7px;"></span>
                <span class="status">● Connected</span>
            </div>

            <div id="messages">

            </div>

            <div class="footer-chat">
                <input type="text" class="messageInput" placeholder="Write your message...">
                <button onclick="sendMessage()" class="sendBtn">Send</button>
            </div>
        </div>
        
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const statusConnect = document.querySelector('.status');
        const messageInput = document.querySelector('.messageInput');
        const messages = document.getElementById('messages');
        const nicknameInput = document.querySelector('.nicknameInput');
        const loginScreen = document.getElementById('loginScreen');
        const chatScreen = document.getElementById('chatScreen');
        const nicknameDisplay = document.getElementById('nickname');
        const roomList = document.getElementById('roomList');
        const currentRoomSpan = document.getElementById('currentRoom');

        const socket = io();
        let mySocketId = '';
        let myNickname = '';

        let unreadCounts = {};

        socket.on('connect', () => {
            console.log('Successfully connected', socket.id);
            mySocketId = socket.id;
        });

        socket.on('room list', (rooms) => {
            displayRoomList(rooms);
        });

        socket.on('room joined', (roomName) => {
            currentRoomSpan.textContent = roomName;
            messages.innerHTML = '';
        });

        socket.on('chat message', (data) => {
            addMessage(data.type, data.userId, data.nickname, data.content, data.timeStamp);

            const currentRoom = currentRoomSpan.textContent;
            if (data.type === 'user' && data.userId !== mySocketId) {
                if (data.currentRoom !== currentRoom) {
                    unreadCounts[data.currentRoom] = (unreadCounts[data.currentRoom] || 0) + 1;
                    upgradeRoomBadge(data.currentRoom);
                }
            }
        });

        socket.on('system message', (data) => {
            addSystemMessage(data.content, data.timeStamp);
        });

        socket.on('disconnect', () => {
            console.log('disconnected from server');
            statusDisconnected();
        });

        function statusDisconnected() {
            document.querySelector('.status').textContent = 'disconnected';
            document.querySelector('.status').style.color = 'red';
            messageInput.disabled = true;
        }

        function createRoom() {
            const roomName = prompt('Enter your room name:');
            if (roomName && roomName.trim()) {
                socket.emit('create room', roomName.trim());
            }
        }

        function displayRoomList(rooms) {
            roomList.innerHTML = '';
            rooms.forEach(room => {
                const newRoom = document.createElement('div');
                newRoom.className = 'newRoom';
                newRoom.innerHTML = `
                        <p class="newRoom-name">${escapeHtml(room)}</p>
                    `;
                newRoom.onclick = () => joinRoom(room); // This is active when newRoom click
                roomList.appendChild(newRoom);

                if (unreadCounts[room] > 0) {
                    upgradeRoomBadge(room);
                }
            });
        }

        function upgradeRoomBadge(roomName) {
            const rooms = document.querySelectorAll('.newRoom');
            for (let room of rooms) {
                const roomNameElement = room.querySelector('.newRoom-name');
                if (roomNameElement && roomNameElement.textContent === roomName) {
                    const count = unreadCounts[roomName] || 0;

                    const oldBadge = room.querySelector('.badge');
                    if (oldBadge) oldBadge.remove();

                    if (count > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'badge';
                        badge.textContent = count > 99 ? '99+' : count;
                        room.appendChild(badge);
                    }
                    break;
                }
            }
        }

        function joinRoom(roomName) {
            socket.emit('join room', roomName);

            unreadCounts[roomName] = 0;
            upgradeRoomBadge(roomName);
        }

        function login() {
            myNickname = nicknameInput.value.trim();

            if (myNickname === '') {
                alert('Please enter a nickname!');
                return;
            }

            nicknameDisplay.textContent = myNickname;

            socket.emit('nickname', {
                nickname: myNickname
            });

            console.log('nickname sent:', myNickname);

            loginScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
            messageInput.focus();
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (msg === '') {
                return;
            }

            socket.emit('chat message', {
                content: msg,
                userId: mySocketId,
                timeStamp: new Date().toLocaleTimeString()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        function addMessage(type, userId, nickname, content, time) {
            const newMessage = document.createElement('div');
            if (type === 'user') {
                if (mySocketId === userId) {
                    newMessage.className = 'my-message';
                    newMessage.innerHTML = `
                        <div class="message-content">${content}</div>
                        <div class="message-time">${time}</div>
                    `;
                } else {
                    newMessage.className = 'user-message';
                    newMessage.innerHTML = `
                        <div class="message-nickname">${nickname}</div>
                        <div class="message-content">${content}</div>
                        <div class="message-time">${time}</div>
                    `;
                }
            } 
            
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;
        }

        function addSystemMessage(content, time) {
            const newMessage = document.createElement('div');
            newMessage.className = 'system-message';
            newMessage.innerHTML = `
                <div class="system-content">📢 ${content}</div>
                <div class="system-time">${time}</div>
            `;
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;
        }

        // What is it???
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
