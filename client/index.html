    <script src="/socket.io/socket.io.js"></script>
    <script>
        const statusConnect = document.querySelector('.status');
        const messageInput = document.querySelector('.messageInput');
        const messages = document.getElementById('messages');
        const authScreen = document.getElementById('authScreen');
        const chatScreen = document.getElementById('chatScreen');
        const nicknameDisplay = document.getElementById('nickname');
        const roomList = document.getElementById('roomList');
        const currentRoomSpan = document.getElementById('currentRoom');
        const emojiSection = document.querySelector('.emoji-picker');
        const statusSection = document.querySelector('.status-section');
        const roomUsers = document.querySelector('.room-users');
        const imageInput = document.getElementById('imageInput'); 
        const leaveRoomBtn = document.getElementById('leaveRoomBtn');
        
        let socket = null;
        let mySocketId = '';
        let myNickname = '';
        let unreadCounts = {};
        let typingTimeOut;

        function addEmoji(emoji) {
            messageInput.value += emoji;
            messageInput.focus();

            emojiSection.style.display = 'none';
        }

        function showTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorDiv = document.getElementById('loginError');

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                return;
            }

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Login failed';
                    return;
                }

                localStorage.setItem('chatToken', data.token);
                localStorage.setItem('chatNickname', data.nickname);

                myNickname = data.nickname;
                nicknameDisplay.textContent = myNickname;

                connectSocket(data.token);

                authScreen.style.display = 'none';
                chatScreen.style.display = 'flex';
                messageInput.focus();
            } catch (err) {
                errorDiv.textContent = 'Connection error';
            }
        }

        async function register() {
            const email = document.getElementById('regEmail').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const confirm = document.getElementById('regConfirmPassword').value.trim();
            const errorDiv = document.getElementById('registerError');

            if (!email || !nickname || !password) {
                errorDiv.textContent = 'All fields required';
                return;
            }

            if (password !== confirm) {
                errorDiv.textContent = 'Passwords do not match';
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, nickname, password })
                });

                const data = await res.json();
                if (!res.ok) {
                    errorDiv.textContent = data.error || 'Registration failed';
                    return;
                }
                
                showTab('login');
                document.getElementById('loginEmail').value = email;
                errorDiv.textContent = 'Registration successful! Please login.';
                setTimeout(() => {
                    errorDiv.textContent = '';
                }, 3000);
                
            } catch (err) {
                errorDiv.textContent = 'Connection error';
            }
            
        }

        function connectSocket(token) {
            if (socket) {
                socket.disconnect();
            }
            
            socket = io({
                auth: { token: token }
            });
            
            socket.on('connect', () => {
                console.log('Successfully connected', socket.id);
                mySocketId = socket.id;
            });

            socket.on('connect_error', (err) => {
                console.log('Socket error:', err.message);
                alert('Authentication failed. Please login again.');
                logout();
            });

            socket.on('room list', (rooms) => {
                // const roomNames = rooms.map(room => room.roomName); // I didn't know
                
                displayRoomList(rooms);
            });

            socket.on('room joined', (roomName) => {
                currentRoomSpan.textContent = roomName;
                messages.innerHTML = '';
                leaveRoomBtn.style.display = 'inline-block';
            });

            socket.on('chat message', (data) => {
                console.log('📨 받은 메시지:', data);
                addMessage(data.type, data.userId, data.nickname, data.content, data.timeStamp, data.messageId, data.readBy || []);

                // audio to receive message
                if (data.userId !== mySocketId) {
                    document.getElementById('notificationSound').play().catch(e => console.log(e));
                }

                const currentRoom = currentRoomSpan.textContent;
                if (data.type === 'user' && data.userId !== mySocketId) {
                    if (data.currentRoom !== currentRoom) {
                        unreadCounts[data.currentRoom] = (unreadCounts[data.currentRoom] || 0) + 1;
                        upgradeRoomBadge(data.currentRoom);
                    }
                }
            });

            socket.on('system message', (data) => {
                addSystemMessage(data.content, data.timeStamp);
            });

            socket.on('room history', (messages) => {
                messages.forEach((message) => {
                    const timeStr = formatTime(message.timeStamp);
                    addMessage(message.type, message.userId, message.nickname, message.content, timeStr, message._id, message.readBy || []);
                })
            });

            socket.on('message deleted', (data) => {
                const msgDiv = document.querySelector(`[data-message-id="${data.messageId}"]`);
                if (msgDiv) {
                    msgDiv.remove();
                }
            });

            socket.on('user typing', (data) => {
                const typingIndicator = document.querySelector('.typing-indicator');
                if (!typingIndicator) {
                    const typingStatus = document.createElement('div');
                    typingStatus.className = 'typing-indicator';
                    typingStatus.textContent = `${data.nickname} is typing...`;
                    statusSection.appendChild(typingStatus);
                }
            });

            socket.on('user stop typing', (data) => {
                document.querySelectorAll('.typing-indicator').forEach(el => el.remove());
            });

            socket.on('read update', (data) => {
                // what is it??? 
                const msgDiv = document.querySelector(`[data-message-id="${data.messageId}"]`);

                if (msgDiv) {
                    const readSpan = msgDiv.querySelector('.read-status');
                    if (readSpan) {
                        const count = data.readCount;
                        if (count === 1) {
                            readSpan.textContent = '✓✓';
                        } else if (count > 1) {
                            readSpan.textContent = `✓✓ ${count}`;
                        }
                    }
                }
            });

            socket.on('room users', (data) => {
                displayUsersInRoom(data);
            });

            socket.on('user joined', (data) => {
                const roomUser = document.createElement('div');
                roomUser.className = 'room-user';
                roomUser.textContent = data.nickname;
                if (data.userId === mySocketId) {
                    roomUser.textContent += ' (me)';
                    roomUser.style.color = '#2B5278';
                }
                roomUsers.appendChild(roomUser);
            });

            socket.on('disconnect', () => {
                console.log('Disconnected');
                statusDisconnected();
                leaveRoomBtn.style.display = 'none';
            });
        }

        function formatTime(date) {
            return new Date(date).toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');

            const themeBtn = document.querySelector('.theme-btn');
            if (document.body.classList.contains('dark-mode')) {
                themeBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                themeBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        }

        function logout() {
            if (socket) socket.disconnect();
            localStorage.removeItem('chatToken');
            localStorage.removeItem('chatNickname');
            authScreen.style.display = 'flex';
            chatScreen.style.display = 'none';
        }

        function statusDisconnected() {
            document.querySelector('.status').textContent = 'disconnected';
            document.querySelector('.status').style.color = 'red';
            messageInput.disabled = true;
        }

        function createRoom() {
            const roomName = prompt('Enter your room name:');
            if (roomName && roomName.trim()) {
                socket.emit('create room', roomName.trim());
            }
        }

        function displayRoomList(rooms) {
            roomList.innerHTML = '';
            rooms.forEach(room => {
                console.log(mySocketId);
                console.log(room.createdUserNickname);
                if (room.createdUserNickname === myNickname) {
                    const newRoom = document.createElement('div');
                    newRoom.className = 'newRoom';
                    newRoom.innerHTML = `
                            <p class="newRoom-name">${escapeHtml(room.roomName)}</p>
                            <button class="deleteRoomIcon" onclick="deleteRoom('${escapeHtml(room.roomName)}')">🗑</button>
                        `;
                    newRoom.onclick = () => joinRoom(room.roomName); // This is active when newRoom click
                    roomList.appendChild(newRoom);

                    if (unreadCounts[room.roomName] > 0) {
                        upgradeRoomBadge(room.roomName);
                    }
                }
                else {
                    const newRoom = document.createElement('div');
                    newRoom.className = 'newRoom';
                    newRoom.innerHTML = `
                            <p class="newRoom-name">${escapeHtml(room.roomName)}</p>
                        `;
                    newRoom.onclick = () => joinRoom(room.roomName); // This is active when newRoom click
                    roomList.appendChild(newRoom);

                    if (unreadCounts[room.roomName] > 0) {
                        upgradeRoomBadge(room.roomName);
                    }
                }
            });
        }

        function deleteRoom(roomName) {
            console.log('🗑️ deleteRoom called:', roomName);
            socket.emit('delete room', roomName);
        }

        function upgradeRoomBadge(roomName) {
            const rooms = document.querySelectorAll('.newRoom');
            for (let room of rooms) {
                const roomNameElement = room.querySelector('.newRoom-name');
                if (roomNameElement && roomNameElement.textContent === roomName) {
                    const count = unreadCounts[roomName] || 0;

                    const oldBadge = room.querySelector('.badge');
                    if (oldBadge) oldBadge.remove();

                    if (count > 0) {
                        const badge = document.createElement('span');
                        badge.className = 'badge';
                        badge.textContent = count > 99 ? '99+' : count;
                        room.appendChild(badge);
                    }
                    break;
                }
            }
        }

        function displayUsersInRoom(users) {
            if (!roomUsers) {
                return;
            }

            roomUsers.innerHTML = '';
            users.forEach(user => {
                const roomUser = document.createElement('div');
                roomUser.className = 'room-user';
                roomUser.textContent = `${user.nickname}`;

                if (user.userId === mySocketId || user.nickname === myNickname) {
                    roomUser.textContent += ' (me)';
                    roomUser.style.color = '#2B5278';
                    roomUser.style.fontWeight = 'bold';
                }

                roomUsers.appendChild(roomUser);
            });
        }

        function joinRoom(roomName) {
            socket.emit('join room', roomName);

            unreadCounts[roomName] = 0;
            upgradeRoomBadge(roomName);
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            if (msg === '') {
                return;
            }

            socket.emit('chat message', {
                type: 'user',
                content: msg,
                userId: mySocketId,
                timeStamp: new Date().toLocaleTimeString()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        function leaveRoom() {
            console.log('leaveRoom Button clicked');
            const roomName = currentRoomSpan.textContent;
            if (roomName && roomName !== 'No room') {
                socket.emit('leave room', roomName);

                currentRoomSpan.textContent = 'No room';
                messages.innerHTML = '';
                leaveRoomBtn.style.display = 'none';

                if (roomUsers) roomUsers.innerHTML = '';

                addSystemMessage('You left the room', formatTime(new Date()));
            }
        }

        function showImagePreview(imageUrl) {
            const modal = document.createElement('div');
            modal.className = 'image-preview-modal';
            modal.innerHTML = `<img src="${imageUrl}">`;
            modal.onclick = () => modal.remove();
            document.body.appendChild(modal);
        }

        function addMessage(type, userId, nickname, content, time, msgId, readBy = []) {
            const newMessage = document.createElement('div');
            if (type === 'image') {
                const isMyMessage = (mySocketId === userId || myNickname === nickname);
                newMessage.className = isMyMessage ? 'my-message' : 'user-message';

                newMessage.innerHTML = `
                    <div class="main-my-message">
                        <img src="${content}" class="message-image" onclick="showImagePreview('${content}')">
                        <div class="message-time">${time}</div>
                    </div>
                    ${isMyMessage ? `
                    <div class="message-status">
                        <span class="read-status">${readBy.length > 0 ? (readBy.length === 1 ? '✓✓' : `✓✓ ${readBy.length}`) : ''}</span>
                        <button class="deleteIcon" onclick="deleteMsg('${msgId}')">🗑</button>
                    </div>` : ''}
                `;
                newMessage.dataset.messageId = msgId;
            }
            else if (type === 'user') {
                if (mySocketId === userId || myNickname === nickname) {
                    newMessage.className = 'my-message';
                    newMessage.innerHTML = `
                        <div class="main-my-message">
                            <div class="message-content">${content}</div>
                            <div class="message-time">${time}</div>
                        </div>
                        <div class="message-status">
                            <span class="read-status">${readBy.length > 0 ? (readBy.length === 1 ? '✓✓' : `✓✓ ${readBy.length}`) : ''}</span>
                            <button class="deleteIcon" onclick="deleteMsg('${msgId}')">🗑</button>
                        </div>
                    `;
                    newMessage.dataset.messageId = msgId;
                } else {
                    newMessage.className = 'user-message';
                    newMessage.innerHTML = `
                        <div class="message-nickname">${nickname}</div>
                        <div class="message-content">${content}</div>
                        <div class="message-time">${time}</div>
                    `;
                }
            } 
            
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;

            if (type === 'user' && mySocketId !== userId && myNickname !== nickname) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            socket.emit('read receipt', {
                                messageId: msgId,
                                room: currentRoomSpan.textContent
                            });
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });

                observer.observe(newMessage);
            }

            if (type === 'image' && mySocketId !== userId && myNickname !== nickname) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            socket.emit('read receipt', {
                                messageId: msgId,
                                room: currentRoomSpan.textContent
                            });
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.5 });
                
                observer.observe(newMessage);
            }
        }

        function deleteMsg(messageId) {
            socket.emit('delete message', { messageId, room: currentRoomSpan.textContent });
        }

        function addSystemMessage(content, time) {
            const newMessage = document.createElement('div');
            newMessage.className = 'system-message';
            newMessage.innerHTML = `
                <div class="system-content">📢 ${content}</div>
                <div class="system-time">${time}</div>
            `;
            messages.appendChild(newMessage);
            messages.scrollTop = messages.scrollHeight;
        }

        // What is it???
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        messageInput.addEventListener('keypress', () => {
            socket.emit('typing', { room: currentRoomSpan.textContent });

            clearTimeout(typingTimeOut);
            typingTimeOut = setTimeout(() => {
                socket.emit('stop typing', { room: currentRoomSpan.textContent });
            }, 1000);
        });

        imageInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                addSystemMessage('Image size must be less than 5MB', formatTime(new Date()));
                imageInput.value = '';
                return;
            }

            const formData = new FormData(); // What is FormData???
            formData.append('image', file);

            try {
                const res = await fetch('/upload', {
                    method: 'POST', // format must 'POST', can't POST  
                    body: formData
                });

                const data = await res.json();

                socket.emit('chat message', {
                    type: 'image',
                    content: data.url,
                    userId: mySocketId,
                    room: currentRoomSpan.textContent,
                    timeStamp: new Date().toLocaleTimeString()
                });
            } catch (err) {
                console.error('Upload error:', err);
                addSystemMessage('Image upload failed', formatTime(new Date()));
            }

            imageInput.value = '';
        });

        const savedToken = localStorage.getItem('chatToken');
        const savedNickname = localStorage.getItem('chatNickname');
        const savedStyle = localStorage.getItem('theme');

        if (savedToken && savedNickname) {
            myNickname = savedNickname;
            nicknameDisplay.textContent = myNickname;
            connectSocket(savedToken);
            authScreen.style.display = 'none';
            chatScreen.style.display = 'flex';
        }

        if (savedStyle === 'dark') {
            document.body.classList.add('dark-mode');
            document.querySelector('.theme-btn').textContent = '☀️';
        } else {
            document.querySelector('.theme-btn').textContent = '🌙';
        }
        
    </script>
</body>
</html>
